<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C Compiler IDE</title>
  <meta name="description" content="A browser-based C11 IDE with virtual file system, integrated compiler, and WebAssembly execution.">

  <!-- Cross-Origin Isolation for SharedArrayBuffer (GitHub Pages compatibility) -->
  <script src="coi-serviceworker.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Codicon icons (VS Code icon font) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/base/browser/ui/codicons/codicon/codicon.min.css" crossorigin="anonymous">

  <!-- Monaco Editor AMD loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js" crossorigin="anonymous"></script>

  <!-- Compiler Engine (order matters: stdlib before compiler) -->
  <script src="stdlib.js" crossorigin="anonymous"></script>
  <script src="compiler.js" crossorigin="anonymous"></script>

  <!-- App Stylesheet -->
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- ═══════════ TOOLBAR ═══════════ -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar-left">
      <div class="brand">
        <div class="brand-icon">C</div>
        <span class="brand-title">C Compiler IDE</span>
      </div>
      <div class="toolbar-sep"></div>
      <select id="preset-select" class="toolbar-select" aria-label="Code preset"></select>
    </div>
    <div class="toolbar-right">
      <button id="btn-new" class="toolbar-btn" title="New file (Ctrl+N)">
        <i class="codicon codicon-new-file"></i> New File
      </button>
      <div class="toolbar-sep"></div>
      <button id="btn-build" class="toolbar-btn toolbar-btn-build" title="Build (Compile to WASM)">
        <i class="codicon codicon-tools"></i> Build
      </button>
      <button id="btn-run" class="toolbar-btn toolbar-btn-run" title="Build & Run (Ctrl+Enter)">
        <i class="codicon codicon-play"></i> Run
      </button>
    </div>
  </div>

  <!-- ═══════════ MAIN LAYOUT ═══════════ -->
  <div class="ide-container">

    <!-- SIDEBAR: File Explorer -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">EXPLORER</span>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-header" id="sidebar-project-header">
          <i class="codicon codicon-chevron-down"></i>
          <span>PROJECT</span>
        </div>
        <div class="file-tree" id="file-tree">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- SIDEBAR RESIZE HANDLE -->
    <div class="sidebar-resize" id="sidebar-resize"></div>

    <!-- WORKBENCH: Editor + Terminal -->
    <div class="workbench">

      <!-- TAB BAR -->
      <div class="tab-bar" id="tab-bar">
        <!-- Populated by JS -->
      </div>

      <!-- EDITOR -->
      <div class="editor-area" id="editor-area">
        <div id="monaco-editor"></div>
        <!-- Welcome screen when no tabs are open -->
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-icon">C</div>
          <h2>C Compiler IDE</h2>
          <p>Open a file from the explorer, or create a new one.</p>
          <div class="welcome-shortcuts">
            <div><kbd>Ctrl</kbd>+<kbd>Enter</kbd> Build &amp; Run</div>
            <div><kbd>Ctrl</kbd>+<kbd>N</kbd> New File</div>
          </div>
        </div>
      </div>

      <!-- TERMINAL RESIZE HANDLE -->
      <div class="terminal-resize" id="terminal-resize"></div>

      <!-- TERMINAL PANEL -->
      <div class="terminal-panel" id="terminal-panel">
        <div class="terminal-header">
          <div class="terminal-tabs">
            <span class="terminal-tab active">
              <i class="codicon codicon-terminal"></i> Terminal
            </span>
          </div>
          <div class="terminal-actions">
            <button class="terminal-action-btn" id="btn-clear-term" title="Clear Terminal">
              <i class="codicon codicon-clear-all"></i>
            </button>
            <button class="terminal-action-btn" id="btn-toggle-term" title="Toggle Terminal">
              <i class="codicon codicon-chevron-down"></i>
            </button>
          </div>
        </div>
        <div class="terminal-body" id="terminal">
          <div class="term-line term-sys">C Compiler IDE — Ready. Press ▶ Run or Ctrl+Enter.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ STATUS BAR ═══════════ -->
  <div class="status-bar" id="status-bar">
    <div class="status-left">
      <span class="status-item" id="status-build">
        <i class="codicon codicon-check"></i> Ready
      </span>
    </div>
    <div class="status-right">
      <span class="status-item" id="status-file">main.c</span>
      <span class="status-item" id="status-lang">C</span>
      <span class="status-item" id="status-cursor">Ln 1, Col 1</span>
    </div>
  </div>

  <!-- App Logic (after DOM) -->
  <script src="app.js"></script>
</body>
</html>
